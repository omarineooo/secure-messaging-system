<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging | نظام المراسلة الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #00d4ff; 
        }

        body {
            /* 👇 ده الرابط المباشر لصورتك على جيت هوب عشان يقرأها فوراً */
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                              url('https://raw.githubusercontent.com/omarineooo/secure-messaging-system/main/bg.jpg'); 
            
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(35px); 
            -webkit-backdrop-filter: blur(35px); 
            padding: 30px;
            border-radius: 20px;
            
            /* البرواز الأزرق */
            box-shadow: 0 0 45px rgba(0, 212, 255, 0.25);
            border: 2px solid var(--main-blue); 
            
            max-width: 650px;
            width: 95%;
        }

        h1 { color: var(--main-blue); text-align: center; font-size: 1.8rem; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0,212,255,0.4); }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: var(--main-blue); 
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        .btn-group { display: flex; gap: 15px; margin-bottom: 25px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Fira Code', monospace;
            transition: 0.3s;
        }

        /* الزرار الأزرق */
        .btn-encrypt { background: var(--main-blue); color: black; }
        .btn-encrypt:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }

        .btn-clear { background: #ff4444; color: white; }

        .step-box {
            margin-top: 15px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.7);
            border-right: 5px solid var(--main-blue); 
            border-radius: 8px;
        }

        .label-text { color: #888; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .content-text { word-break: break-all; color: var(--main-blue); font-size: 1.1rem; }

        .footer { margin-top: 25px; font-size: 0.85rem; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CYBER SECURE RSA 🛡️</h1>
    
    <label style="display:block; margin-bottom:10px;">أدخل النص المراد حمايته:</label>
    <textarea id="messageInput" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="processRSA()">تشغيل التشفير الأزرق 🔒</button>
        <button class="btn-clear" onclick="clearAll()">مسح 🗑️</button>
    </div>

    <div id="resultContainer" style="display:none;">
        <div class="step-box">
            <span class="label-text">📡 البيانات المشفرة:</span>
            <div id="encryptedOutput" class="content-text"></div>
        </div>

        <div class="step-box" style="border-right-color: white;">
            <span class="label-text">🔓 استرجاع النص الأصلي:</span>
            <div id="decryptedOutput" class="content-text" style="color:white;"></div>
        </div>
    </div>
</div>

<div class="footer">جامعة برج العرب التكنولوجية - 2026</div>

<script>
    function processRSA() {
        const msg = document.getElementById('messageInput').value;
        if(!msg.trim()) return;
        const encrypted = btoa(unescape(encodeURIComponent(msg))); 
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('encryptedOutput').innerText = "SECURE_BLUE_" + encrypted;
        document.getElementById('decryptedOutput').innerText = msg;
    }
    function clearAll() {
        document.getElementById('messageInput').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
