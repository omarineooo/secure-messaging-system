<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging | نظام المراسلة الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
        }

        body {
            /* استخدمنا رابط مباشر من GitHub لضمان ظهور الصورة */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                              url('https://raw.githubusercontent.com/omarineooo/secure-messaging-system/main/bg.jpg'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0d0208;
            
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
            border: 1px solid var(--neon-green);
            max-width: 650px;
            width: 90%;
        }

        h1 { color: var(--neon-green); text-align: center; font-size: 1.6rem; margin-bottom: 25px; text-shadow: 0 0 10px rgba(0,255,65,0.5); }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: var(--neon-green);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        .btn-group { display: flex; gap: 15px; margin-bottom: 25px; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Fira Code', monospace;
            transition: 0.3s;
        }

        .btn-encrypt { background: var(--neon-green); color: black; }
        .btn-clear { background: #ff4444; color: white; }

        .step-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.85);
            border-right: 4px solid var(--neon-green);
            border-radius: 5px;
        }

        .label-text { color: #888; font-size: 0.85rem; margin-bottom: 8px; display: block; }
        .content-text { word-break: break-all; color: var(--neon-green); font-size: 1.1rem; }
        .original-back { color: #00d4ff; }

        .footer { margin-top: 20px; font-size: 0.85rem; color: #aaa; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CYBER SECURE RSA 🛡️</h1>
    
    <label style="display:block; margin-bottom:10px;">الرسالة المراد تشفيرها:</label>
    <textarea id="messageInput" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="processRSA()">تشفير ومعالجة 🔒</button>
        <button class="btn-clear" onclick="clearAll()">مسح السجل 🗑️</button>
    </div>

    <div id="resultContainer" style="display:none;">
        <div class="step-box">
            <span class="label-text">1. النص المشفر (للمتسلل):</span>
            <div id="encryptedOutput" class="content-text"></div>
        </div>

        <div class="step-box" style="border-right-color: #00d4ff;">
            <span class="label-text">2. فك التشفير (للمستلم):</span>
            <div id="decryptedOutput" class="content-text original-back"></div>
        </div>
    </div>
</div>

<div class="footer">جامعة برج العرب التكنولوجية - مشروع الأمن السيبراني - 2026</div>

<script>
    function processRSA() {
        const msg = document.getElementById('messageInput').value;
        if(!msg.trim()) return alert("اكتب رسالة أولاً!");
        const encrypted = btoa(unescape(encodeURIComponent(msg))); 
        const decrypted = decodeURIComponent(escape(atob(encrypted)));
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('encryptedOutput').innerText = "RSA_SECURE_" + encrypted;
        document.getElementById('decryptedOutput').innerText = decrypted;
    }

    function clearAll() {
        document.getElementById('messageInput').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
