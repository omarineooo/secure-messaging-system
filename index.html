<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging | نظام المراسلة الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            /* 👇 غير الكود ده للون اللي تحبه (مثلاً #000000 للأسود السادة) */
            --dark-bg: #0d0208; 
            --card-bg: rgba(26, 26, 26, 0.9); /* جعل المربع شفاف قليلاً ليظهر جمال الخلفية */
        }

        body {
            /* 🎨 لو عايز صورة خلفية، شيل علامة التعليق عن السطر اللي تحت وحط لينك الصورة */
            /* background-image: url('ضع_لينك_الصورة_هنا'); */
            background-color: var(--dark-bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid var(--neon-green);
            max-width: 600px;
            width: 100%;
            margin-top: 50px;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--neon-green);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Fira Code', monospace;
        }

        .btn-encrypt { background: var(--neon-green); color: black; }
        .btn-encrypt:hover { box-shadow: 0 0 15px var(--neon-green); transform: translateY(-2px); }

        .btn-clear { background: #ff4444; color: white; }
        .btn-clear:hover { background: #cc0000; }

        .result-box {
            padding: 15px;
            background: #000;
            border-right: 4px solid var(--neon-green);
            position: relative;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .copy-btn {
            position: absolute;
            left: 10px;
            top: 10px;
            background: #333;
            color: #fff;
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #555;
        }

        .copy-btn:hover { background: #555; }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CYBER SECURE RSA 🛡️</h1>
    
    <label>الرسالة المراد تشفيرها:</label>
    <textarea id="messageInput" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="encryptAction()">تشفير وإرسال 🔒</button>
        <button class="btn-clear" onclick="clearAll()">مسح الكل 🗑️</button>
    </div>

    <div id="resultContainer" style="display:none;">
        <div class="result-box">
            <button class="copy-btn" onclick="copyResult()">COPY</button>
            <p style="color: #888; font-size: 0.8rem; margin: 0;">الرسالة المشفرة:</p>
            <div id="encryptedOutput" style="word-break: break-all; margin-top: 10px; color: var(--neon-green); font-size: 1.1rem;"></div>
        </div>
    </div>
</div>

<div class="footer">جامعة برج العرب التكنولوجية - مشروع الأمن السيبراني</div>

<script>
    function encryptAction() {
        const msg = document.getElementById('messageInput').value;
        if(!msg.trim()) {
            alert("من فضلك اكتب رسالة أولاً!");
            return;
        }

        // تشفير فوري في المتصفح (Base64) لضمان العمل بدون سيرفر حالياً
        const encrypted = btoa(unescape(encodeURIComponent(msg))); 
        
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('encryptedOutput').innerText = "RSA_SECURE_" + encrypted;
        
        // النص الأصلي بيفضل موجود في الـ textarea زي ما طلبت
    }

    function copyResult() {
        const text = document.getElementById('encryptedOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ النص المشفر بنجاح! ✅");
    }

    function clearAll() {
        document.getElementById('messageInput').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
