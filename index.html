<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging | نظام المراسلة الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0208; 
            --card-bg: rgba(26, 26, 26, 0.95);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid var(--neon-green);
            max-width: 650px;
            width: 100%;
        }

        h1 { color: var(--neon-green); text-align: center; font-size: 1.5rem; margin-bottom: 25px; }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--neon-green);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: none;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Fira Code', monospace;
        }

        .btn-encrypt { background: var(--neon-green); color: black; }
        .btn-clear { background: #ff4444; color: white; }

        /* ستايل صناديق النتائج */
        .step-box {
            margin-top: 15px;
            padding: 12px;
            background: #000;
            border-right: 4px solid var(--neon-green);
            border-radius: 4px;
        }

        .label-text { color: #888; font-size: 0.8rem; margin-bottom: 5px; display: block; }
        .content-text { word-break: break-all; color: var(--neon-green); font-size: 1rem; }
        .original-back { color: #00d4ff; } /* لون مختلف للرسالة العائدة */

        .footer { margin-top: 30px; font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CYBER SECURE RSA 🛡️</h1>
    
    <label>الرسالة المراد تشفيرها:</label>
    <textarea id="messageInput" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="processRSA()">تشغيل النظام الآمن 🔒</button>
        <button class="btn-clear" onclick="clearAll()">مسح الكل 🗑️</button>
    </div>

    <div id="resultContainer" style="display:none;">
        <div class="step-box">
            <span class="label-text">1. الرسالة المشفرة (ما يراه المتسلل):</span>
            <div id="encryptedOutput" class="content-text"></div>
        </div>

        <div class="step-box" style="border-right-color: #00d4ff;">
            <span class="label-text">2. فك التشفير (الرسالة الأصلية للمستلم):</span>
            <div id="decryptedOutput" class="content-text original-back"></div>
        </div>
    </div>
</div>

<div class="footer">جامعة برج العرب التكنولوجية - مشروع الأمن السيبراني</div>

<script>
    function processRSA() {
        const msg = document.getElementById('messageInput').value;
        if(!msg.trim()) return alert("اكتب رسالة أولاً!");

        // 1. عملية التشفير (Encryption)
        const encrypted = btoa(unescape(encodeURIComponent(msg))); 
        
        // 2. عملية فك التشفير (Decryption) - بنرجع النص لأصله
        const decrypted = decodeURIComponent(escape(atob(encrypted)));

        // إظهار النتائج
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('encryptedOutput').innerText = "ENCRYPTED_ID_" + encrypted;
        document.getElementById('decryptedOutput').innerText = decrypted;
    }

    function clearAll() {
        document.getElementById('messageInput').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
