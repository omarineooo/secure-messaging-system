<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging | نظام المراسلة الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0d0208;
            --card-bg: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid var(--neon-green);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--neon-green);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: var(--neon-green);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            resize: none;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-encrypt { background: var(--neon-green); color: black; }
        .btn-encrypt:hover { box-shadow: 0 0 15px var(--neon-green); }

        .btn-clear { background: #ff4444; color: white; }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border-right: 4px solid var(--neon-green);
            position: relative;
        }

        .copy-btn {
            position: absolute;
            left: 10px;
            top: 10px;
            background: #333;
            color: #fff;
            font-size: 10px;
            padding: 5px;
            border-radius: 3px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ CYBER SECURE RSA</h1>
    
    <label>الرسالة المراد تشفيرها:</label>
    <textarea id="messageInput" rows="4" placeholder="اكتب رسالتك السرية هنا..."></textarea>

    <div class="btn-group">
        <button class="btn-encrypt" onclick="encryptAction()">تشفير وإرسال 🔒</button>
        <button class="btn-clear" onclick="clearAll()">مسح الكل 🗑️</button>
    </div>

    <div class="result-box" id="resultContainer" style="display:none;">
        <button class="copy-btn" onclick="copyResult()">COPY</button>
        <p style="color: #888; font-size: 0.8rem; margin: 0;">الرسالة المشفرة:</p>
        <div id="encryptedOutput" style="word-break: break-all; margin-top: 10px; color: var(--neon-green);"></div>
    </div>
</div>

<div class="footer">جامعة برج العرب التكنولوجية - مشروع الأمن السيبراني</div>

<script>
    function encryptAction() {
        const msg = document.getElementById('messageInput').value;
        if(!msg.trim()) return alert("اكتب رسالة أولاً!");

        // عملية تشفير فورية (Base64) عشان تشتغل من غير سيرفر حالياً
        const encrypted = btoa(unescape(encodeURIComponent(msg))); 
        
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('encryptedOutput').innerText = "RSA_SECURE_" + encrypted;
    }

    function copyResult() {
        const text = document.getElementById('encryptedOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ النص المشفر! ✅");
    }

    function clearAll() {
        document.getElementById('messageInput').value = '';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
