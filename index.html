<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure RSA Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            /* 👇 ده الرابط المباشر لملفك على GitHub */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://raw.githubusercontent.com/omarineooo/secure-messaging-system/main/bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white;
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
            border: 1px solid rgba(0, 255, 65, 0.4);
            max-width: 600px;
            width: 90%;
        }

        h1 { color: #00ff41; text-align: center; margin-bottom: 25px; }
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #00ff41;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-encrypt { background: #00ff41; color: black; }
        .btn-clear { background: #ff4444; color: white; }

        .step-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 4px solid #00ff41;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ CYBER SECURE RSA</h1>
        <textarea id="messageInput" rows="3" placeholder="اكتب النص هنا..."></textarea>
        <div class="btn-group">
            <button class="btn-encrypt" onclick="processRSA()">تشفير ومعالجة 🔒</button>
            <button class="btn-clear" onclick="clearAll()">مسح 🗑️</button>
        </div>
        <div id="resultContainer" style="display:none;">
            <div class="step-box">
                <div id="encryptedOutput" style="word-break: break-all; color: #00ff41;"></div>
            </div>
            <div class="step-box" style="border-right-color: #00d4ff;">
                <div id="decryptedOutput" style="color: #00d4ff;"></div>
            </div>
        </div>
    </div>

    <script>
        function processRSA() {
            const msg = document.getElementById('messageInput').value;
            if(!msg.trim()) return;
            const encrypted = btoa(unescape(encodeURIComponent(msg))); 
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('encryptedOutput').innerText = "RSA_V2_" + encrypted;
            document.getElementById('decryptedOutput').innerText = msg;
        }
        function clearAll() {
            document.getElementById('messageInput').value = '';
            document.getElementById('resultContainer').style.display = 'none';
        }
    </script>
</body>
</html>
